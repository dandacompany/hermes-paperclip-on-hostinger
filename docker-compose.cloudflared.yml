# Cloudflare Tunnel mode override — no Traefik required, no inbound
# ports opened on the host. A `cloudflared` sidecar dials out to
# Cloudflare's edge and proxies inbound HTTPS requests back to the
# three services over the project bridge network.
#
# Use this for:
#   - Laptops behind NAT that need a public URL.
#   - VPSes without Traefik, or where you'd rather not expose 80/443.
#   - Adding Cloudflare Access (email/OAuth gate) in front for free.
#
# Bootstrap (one-time):
#   1. `cloudflared tunnel login`        (creates a cert.pem in your home)
#   2. `cloudflared tunnel create hermes-paperclip`
#   3. Copy the resulting <UUID>.json credentials into ./cloudflared/
#   4. Edit ./cloudflared/config.yml with your hostnames
#   5. `cloudflared tunnel route dns hermes-paperclip tui.yourdomain.com`
#      (repeat for dash. and paperclip.)
#
# After that: `docker compose up -d` reads this override and brings
# the tunnel up automatically.

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "--config", "/etc/cloudflared/config.yml", "run"]
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    networks:
      - default
    depends_on:
      hermes-tui:
        condition: service_started
      hermes-dashboard:
        condition: service_started
      paperclip:
        condition: service_started

  paperclip:
    environment:
      PAPERCLIP_PUBLIC_URL: "https://paperclip.${PROJECT_DOMAIN}"
