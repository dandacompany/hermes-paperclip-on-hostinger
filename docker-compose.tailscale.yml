services:
  paperclip-hermes-codex:
    network_mode: "service:tailscale"
    depends_on:
      tailscale:
        condition: service_healthy

  tailscale:
    image: tailscale/tailscale:latest
    hostname: ${TS_HOSTNAME:-paperclip}
    restart: unless-stopped
    environment:
      TS_AUTHKEY:   ${TS_AUTHKEY}
      TS_HOSTNAME:  ${TS_HOSTNAME:-paperclip}
      TS_STATE_DIR: /var/lib/tailscale
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add: [NET_ADMIN, SYS_MODULE]
    entrypoint: |
      sh -c "set -e;
             tailscaled --tun=userspace-networking --state=/var/lib/tailscale/tailscaled.state &
             sleep 3;
             tailscale up --authkey=$$TS_AUTHKEY --hostname=$$TS_HOSTNAME;
             tailscale serve reset || true;
             tailscale serve --bg --https=443 http://127.0.0.1:3100;
             tailscale serve --bg --https=9119 http://127.0.0.1:9119;
             tailscale serve --bg --https=4860 http://127.0.0.1:4860;
             tail -f /dev/null"
    healthcheck:
      test: ["CMD", "tailscale", "status", "--peers=false", "--json"]
      interval: 10s
      retries: 12

volumes:
  tailscale-state: {}
