# Self-contained compose file for Hostinger Console URL-import deployment.
# Fetches tailscale/serve.json at boot from GitHub Raw (dandacompany/paperclip-hermes-codex-on-hostinger).
#
# Usage (Hostinger Console — URL import):
#   https://raw.githubusercontent.com/dandacompany/paperclip-hermes-codex-on-hostinger/main/docker-compose.console.yml
#
# Required env vars: ADMIN_USERNAME, ADMIN_EMAIL, ADMIN_PASSWORD, TS_AUTHKEY
# Optional env vars: ADMIN_NAME, PAPERCLIP_PUBLIC_URL, TS_HOSTNAME, OPENAI_API_KEY

services:
  paperclip-hermes-codex:
    image: ghcr.io/dandacompany/paperclip-hermes-codex:latest
    platform: linux/amd64
    restart: unless-stopped
    network_mode: "service:tailscale"
    depends_on:
      tailscale: {condition: service_healthy}
    environment:
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_NAME:     ${ADMIN_NAME:-Owner}
      ADMIN_EMAIL:    ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PAPERCLIP_PUBLIC_URL:          ${PAPERCLIP_PUBLIC_URL:-https://${TS_HOSTNAME}.ts.net:3100}
      PAPERCLIP_INSTANCE_ID:         default
      PAPERCLIP_DEPLOYMENT_MODE:     authenticated
      PAPERCLIP_AUTH_BASE_URL_MODE:  explicit
      PAPERCLIP_BIND: lan
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - paperclip-data:/paperclip
      - hermes-data:/home/node/.hermes
      - codex-auth:/home/node/.codex

  tailscale:
    image: tailscale/tailscale:latest
    hostname: ${TS_HOSTNAME:-paperclip}
    restart: unless-stopped
    environment:
      TS_AUTHKEY:      ${TS_AUTHKEY}
      TS_HOSTNAME:     ${TS_HOSTNAME:-paperclip}
      TS_STATE_DIR:    /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - tailscale-state:/var/lib/tailscale
    cap_add: [NET_ADMIN, SYS_MODULE]
    entrypoint: |
      sh -c "set -e;
             mkdir -p /config;
             wget -q -O /config/serve.json https://raw.githubusercontent.com/dandacompany/paperclip-hermes-codex-on-hostinger/main/tailscale/serve.json;
             tailscaled --tun=userspace-networking --state=/var/lib/tailscale/tailscaled.state &
             sleep 3;
             tailscale up --authkey=$$TS_AUTHKEY --hostname=$$TS_HOSTNAME;
             tailscale serve --reset || true;
             tailscale serve --bg --set-path /config/serve.json;
             tail -f /dev/null"
    healthcheck:
      test: ["CMD", "tailscale", "status", "--peers=false", "--json"]
      interval: 10s
      retries: 12

volumes:
  paperclip-data:  {}
  hermes-data:     {}
  codex-auth:      {}
  tailscale-state: {}
