# Traefik mode override — expose via labels picked up by an existing
# Traefik instance running on the same Docker host. No host port maps;
# Traefik reaches the containers over the project bridge network.
#
# Use this for: Hostinger VPS Docker Manager (Traefik already running),
# or any VPS where you've stood up Traefik separately.
#
# Three hostnames, three roles:
#   tui.${PROJECT_DOMAIN}        → Hermes ttyd terminal (self auth)
#   dash.${PROJECT_DOMAIN}       → Hermes dashboard (Hermes session token)
#   paperclip.${PROJECT_DOMAIN}  → Paperclip web UI (Paperclip session)
#
# All three get Let's Encrypt certs via Traefik's letsencrypt
# certresolver. None of them have a Traefik basic-auth middleware in
# front — each service holds its own auth. If you want an extra layer
# in front of the Hermes dashboard, add a basic-auth middleware label
# here (see docs/EXPOSURE-traefik.md).

services:
  hermes-tui:
    labels:
      - traefik.enable=true
      - traefik.docker.network=${COMPOSE_PROJECT_NAME:-hermes-paperclip}_net
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-hermes-paperclip}-tui.rule=Host(`tui.${PROJECT_DOMAIN}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-hermes-paperclip}-tui.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-hermes-paperclip}-tui.tls.certresolver=letsencrypt
      - traefik.http.services.${COMPOSE_PROJECT_NAME:-hermes-paperclip}-tui.loadbalancer.server.port=4860

  hermes-dashboard:
    labels:
      - traefik.enable=true
      - traefik.docker.network=${COMPOSE_PROJECT_NAME:-hermes-paperclip}_net
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-hermes-paperclip}-dash.rule=Host(`dash.${PROJECT_DOMAIN}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-hermes-paperclip}-dash.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-hermes-paperclip}-dash.tls.certresolver=letsencrypt
      - traefik.http.services.${COMPOSE_PROJECT_NAME:-hermes-paperclip}-dash.loadbalancer.server.port=9119

  paperclip:
    environment:
      PAPERCLIP_PUBLIC_URL: "https://paperclip.${PROJECT_DOMAIN}"
    labels:
      - traefik.enable=true
      - traefik.docker.network=${COMPOSE_PROJECT_NAME:-hermes-paperclip}_net
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-hermes-paperclip}-paper.rule=Host(`paperclip.${PROJECT_DOMAIN}`)
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-hermes-paperclip}-paper.entrypoints=websecure
      - traefik.http.routers.${COMPOSE_PROJECT_NAME:-hermes-paperclip}-paper.tls.certresolver=letsencrypt
      - traefik.http.services.${COMPOSE_PROJECT_NAME:-hermes-paperclip}-paper.loadbalancer.server.port=3100
